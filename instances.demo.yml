# Demo PostgreSQL instance for `pgai mon local-install --demo`
# This file is copied to instances.yml during demo mode setup.

- name: target_database
  conn_str: postgresql://monitor:monitor_pass@target-db:5432/target_database
  preset_metrics: full
  custom_metrics:
  is_enabled: true
  group: default
  custom_tags:
    env: demo
    cluster: local
    node_name: node-01
    sink_type: ~sink_type~  # placeholder replaced by generate-pgwatch-sources.sh per sink
