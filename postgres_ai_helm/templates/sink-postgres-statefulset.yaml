apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgres-ai-monitoring.fullname" . }}-sink-postgres
  namespace: {{ include "postgres-ai-monitoring.namespace" . }}
  labels:
    {{- include "postgres-ai-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: sink-postgres
spec:
  serviceName: {{ include "postgres-ai-monitoring.fullname" . }}-sink-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "postgres-ai-monitoring.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sink-postgres
  template:
    metadata:
      labels:
        {{- include "postgres-ai-monitoring.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sink-postgres
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Fail fast with an actionable message if the on-disk PGDATA major
        # version does not match the image. Without this, postgres crash-
        # loops with only "database files are incompatible with server"
        # buried in the logs, and `helm upgrade` against an existing PG 15
        # PVC surfaces as a generic pod CrashLoopBackOff.
        - name: pg-version-guard
          image: {{ .Values.sinkPostgres.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          command: ["bash", "-c"]
          args:
            - |
              set -Eeuo pipefail
              version_file="${PGDATA}/PG_VERSION"
              if [[ ! -f "${version_file}" ]]; then
                exit 0  # empty PGDATA: initdb will run on first start
              fi
              on_disk="$(tr -d '[:space:]' < "${version_file}")"
              image="$(postgres --version | awk '{print $3}' | cut -d. -f1)"
              if [[ -n "${on_disk}" && "${on_disk}" != "${image}" ]]; then
                cat >&2 <<EOF
              =======================================================================
              PostgreSQL version mismatch — refusing to start.

                PVC PG version:   ${on_disk}
                Image PG version: ${image}

              On-disk format is not compatible across majors. Starting postgres
              now would crash-loop. Data is NOT lost; it is simply unreadable
              by this image version.

              Upgrade path (see PostgresAI MR !145 runbook):
                1. Scale this StatefulSet to 0.
                2. Run pg_upgrade against the PVC from PG ${on_disk} to PG ${image},
                   OR dump-and-restore into a fresh PVC.
                3. Scale back to 1.
              =======================================================================
              EOF
                exit 3
              fi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: {{ .Values.sinkPostgres.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: {{ .Values.sinkPostgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.sinkPostgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres-ai-monitoring.secretName" . }}
                  key: postgres-password
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "trust"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          {{- with .Values.sinkPostgres.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "postgres-ai-monitoring.fullname" . }}-sink-postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ .Values.storage.accessModes }}
        {{- if .Values.storage.storageClassName }}
        storageClassName: {{ .Values.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.postgresSize }}
