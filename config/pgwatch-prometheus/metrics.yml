        from summary
    gauges:
      - '*'
    is_instance_level: true
    node_status: primary
    statement_timeout_seconds: 15
  xmin_horizon_blockers:
    description: >
      Captures the top xmin-horizon blocker for each active component (`pg_stat_activity`,
      `pg_replication_slots`, `pg_replication_slots_catalog`, `pg_stat_replication`,
      `pg_prepared_xacts`) as a separate labeled series with the blocker's xmin age in
      transactions (`age_tx`). Primary-only. Emits one series per currently active
      component (the single oldest blocker for that component) and no series for an empty
      component, so cardinality varies between 0 and 5 per scrape. The labels carry RCA
      context for that single top blocker: horizon type, activity queryid and session
      identity, replication slot name/type/status/xmin source, standby name, and prepared
      transaction gid/owner. Query text is intentionally not emitted as a Prometheus label;
      use the queryid link to inspect text from pgwatch query storage.
    sqls:
      11: |-
        with activity as (
          select
            'pg_stat_activity'::text as tag_component,
            'data'::text as tag_horizon_type,
            coalesce(datname, '')::text as tag_blocker_database,
            coalesce(usename, '')::text as tag_blocker_user,
            coalesce(application_name, '')::text as tag_blocker_appname,
            coalesce(state, '')::text as tag_blocker_state,
            coalesce(to_jsonb(a)->>'query_id', '')::text as tag_queryid,
            ''::text as tag_slot_name,
            ''::text as tag_slot_type,
            ''::text as tag_slot_plugin,
            ''::text as tag_slot_xmin_source,
            ''::text as tag_slot_status,
            ''::text as tag_slot_wal_status,
            ''::text as tag_slot_inactive_since,
            ''::text as tag_slot_conflicting,
            ''::text as tag_slot_invalidation_reason,
            ''::text as tag_replication_state,
            ''::text as tag_replication_sync_state,
            ''::text as tag_standby_name,
            ''::text as tag_prepared_gid,
            ''::text as tag_owner,
            age(backend_xmin)::int8 as age_tx
          from pg_stat_activity as a
          where
            pid <> pg_backend_pid()
            and backend_type = 'client backend'
            and backend_xmin is not null
            and usename <> current_user
          order by age(backend_xmin) desc, pid asc
          limit 1
        ),
        slots as (
          select
            'pg_replication_slots'::text as tag_component,
            'data'::text as tag_horizon_type,
            coalesce(database, '')::text as tag_blocker_database,
            ''::text as tag_blocker_user,
            ''::text as tag_blocker_appname,
            case when active then 'active' else 'inactive' end::text as tag_blocker_state,
            ''::text as tag_queryid,
            slot_name::text as tag_slot_name,
            slot_type::text as tag_slot_type,
            coalesce(plugin, '')::text as tag_slot_plugin,
            'xmin'::text as tag_slot_xmin_source,
            case
              when coalesce(to_jsonb(s)->>'invalidation_reason', '') <> '' then 'invalidated'
              when coalesce(to_jsonb(s)->>'conflicting', 'false') = 'true' then 'conflicting'
              when not active and coalesce(to_jsonb(s)->>'inactive_since', '') <> '' then 'inactive'
              when not active then 'unused'
              else 'active'
            end::text as tag_slot_status,
            coalesce(to_jsonb(s)->>'wal_status', '')::text as tag_slot_wal_status,
            coalesce(to_jsonb(s)->>'inactive_since', '')::text as tag_slot_inactive_since,
