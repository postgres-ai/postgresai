# Simple PGWatch Metrics for Prometheus - just queryid and calls

# The following structure is expected for metrics and preset definitions:
# metrics:
#    metric_name:
#        init_sql: |-
#            CREATE EXTENSIon IF not EXISTS some_extension;
#            CREATE OR REPLACE FUNCTIon get_some_stat(OUT some_stat int)
#            ...
#        sqls:
#            11: |
#                select /* pgwatch_generated */
#                  (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
#                  ...
#            14: |
#                select /* pgwatch_generated */
#                  (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
#                  ...
#        gauges:
#            - '*'
#        is_instance_level: true
#        node_status: primary
#        statement_timeout_seconds: 300
#        metric_storage_name: db_stats
metrics:
  bgwriter:
    description: >
      Retrieves key statistics from the PostgreSQL `pg_stat_bgwriter` view, providing insights into the background writer's performance.
      It returns the number of timed and requested checkpoints, checkpoint write and sync times, buffer statistics, and the last reset time.
      This metric helps administrators monitor the background writer's activity and its impact on database performance.
    sqls:
      11: |-
        select /* pgwatch_generated */
            (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
            current_database() as tag_datname,
            checkpoints_timed,
            checkpoints_req,
            checkpoint_write_time,
            checkpoint_sync_time,
            buffers_checkpoint,
            buffers_clean,
            maxwritten_clean,
            buffers_backend,
            buffers_backend_fsync,
            buffers_alloc
          from
            pg_stat_bgwriter
      17: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          buffers_clean,
          maxwritten_clean,
          buffers_alloc,
          (extract(epoch from now() - stats_reset))::int as last_reset_s
        from
          pg_stat_bgwriter
    node_status: primary
    is_instance_level: true
    statement_timeout_seconds: 15
  checkpointer:
    description: >
      Retrieves key statistics from the PostgreSQL `pg_stat_checkpointer` view, providing insights into the checkpointer's performance.
      It returns the number of timed and requested checkpoints, restart points, write and sync times, and buffer statistics.
      This metric helps administrators monitor the checkpointer's activity and its impact on database performance.
    sqls:
      11: "; -- covered by bgwriter"
      17: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          num_timed,
          num_requested,
          restartpoints_timed,
          restartpoints_req,
          restartpoints_done,
          write_time,
          sync_time,
          buffers_written,
          (extract(epoch from now() - stats_reset))::int as last_reset_s
        from
          pg_stat_checkpointer
    statement_timeout_seconds: 15
  db_size:
    description: >
      Retrieves the size of the current database and the size of the `pg_catalog` schema, providing insights into the storage usage of the database.
      It returns the size in bytes for both the current database and the catalog schema.
      This metric helps administrators monitor database size and storage consumption.
    sqls:
      11: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          pg_database_size(current_database()) as size_b,
          (select sum(pg_total_relation_size(c.oid))::int8
            from pg_class c join pg_namespace n on n.oid = c.relnamespace
            where nspname = 'pg_catalog' and relkind = 'r'
          ) as catalog_size_b
    gauges:
      - '*'
    statement_timeout_seconds: 300
  db_stats:
    description: >
      Retrieves key statistics from the PostgreSQL `pg_stat_database` view, providing insights into the current database's performance.
      It returns the number of backends, transaction commits and rollbacks, buffer reads and hits, tuple statistics, conflicts, temporary files and bytes,
      deadlocks, block read and write times, postmaster uptime, backup duration, recovery status, system identifier, and invalid indexes.
      This metric helps administrators monitor database activity and performance.
    sqls:
      11: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          numbackends,
          xact_commit,
          xact_rollback,
          blks_read,
          blks_hit,
          tup_returned,
          tup_fetched,
          tup_inserted,
          tup_updated,
          tup_deleted,
          conflicts,
          temp_files,
          temp_bytes,
          deadlocks,
          blk_read_time,
          blk_write_time,
          extract(epoch from (now() - pg_postmaster_start_time()))::int8 as postmaster_uptime_s,
          case when pg_is_in_recovery() then 1 else 0 end as in_recovery_int,
          system_identifier::text as tag_sys_id,
          (select count(*) from pg_index i
            where not indisvalid
            and not exists ( /* leave out ones that are being actively rebuilt */
              select * from pg_locks l
              join pg_stat_activity a using (pid)
              where l.relation = i.indexrelid
              and a.state = 'active'
              and a.query ~* 'concurrently'
          )) as invalid_indexes
        from
          pg_stat_database, pg_control_system()
        where
          datname = current_database()
      12: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          numbackends,
          xact_commit,
          xact_rollback,
          blks_read,
          blks_hit,
          tup_returned,
          tup_fetched,
          tup_inserted,
          tup_updated,
          tup_deleted,
          conflicts,
          temp_files,
          temp_bytes,
          deadlocks,
          blk_read_time,
          blk_write_time,
          extract(epoch from (now() - pg_postmaster_start_time()))::int8 as postmaster_uptime_s,
          extract(epoch from (now() - pg_backup_start_time()))::int8 as backup_duration_s,
          checksum_failures,
          extract(epoch from (now() - checksum_last_failure))::int8 as checksum_last_failure_s,
          case when pg_is_in_recovery() then 1 else 0 end as in_recovery_int,
          system_identifier::text as tag_sys_id,
          (select count(*) from pg_index i
            where not indisvalid
            and not exists ( /* leave out ones that are being actively rebuilt */
              select * from pg_locks l
              join pg_stat_activity a using (pid)
              where l.relation = i.indexrelid
              and a.state = 'active'
              and a.query ~* 'concurrently'
          )) as invalid_indexes
        from
          pg_stat_database, pg_control_system()
        where
          datname = current_database()
      14: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          numbackends,
          xact_commit,
          xact_rollback,
          blks_read,
          blks_hit,
          tup_returned,
          tup_fetched,
          tup_inserted,
          tup_updated,
          tup_deleted,
          conflicts,
          temp_files,
          temp_bytes,
          deadlocks,
          blk_read_time,
          blk_write_time,
          extract(epoch from (now() - pg_postmaster_start_time()))::int8 as postmaster_uptime_s,
          extract(epoch from (now() - pg_backup_start_time()))::int8 as backup_duration_s,
          checksum_failures,
          extract(epoch from (now() - checksum_last_failure))::int8 as checksum_last_failure_s,
          case when pg_is_in_recovery() then 1 else 0 end as in_recovery_int,
          system_identifier::text as tag_sys_id,
          session_time::int8,
          active_time::int8,
          idle_in_transaction_time::int8,
          sessions,
          sessions_abandoned,
          sessions_fatal,
          sessions_killed,
          (select count(*) from pg_index i
            where not indisvalid
            and not exists ( /* leave out ones that are being actively rebuilt */
              select * from pg_locks l
              join pg_stat_activity a using (pid)
              where l.relation = i.indexrelid
              and a.state = 'active'
              and a.query ~* 'concurrently'
          )) as invalid_indexes
        from
          pg_stat_database, pg_control_system()
        where
          datname = current_database()
      15: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          numbackends,
          xact_commit,
          xact_rollback,
          blks_read,
          blks_hit,
          tup_returned,
          tup_fetched,
          tup_inserted,
          tup_updated,
          tup_deleted,
          conflicts,
          temp_files,
          temp_bytes,
          deadlocks,
          blk_read_time,
          blk_write_time,
          extract(epoch from (now() - pg_postmaster_start_time()))::int8 as postmaster_uptime_s,
          checksum_failures,
          extract(epoch from (now() - checksum_last_failure))::int8 as checksum_last_failure_s,
          case when pg_is_in_recovery() then 1 else 0 end as in_recovery_int,
          system_identifier::text as tag_sys_id,
          session_time::int8,
          active_time::int8,
          idle_in_transaction_time::int8,
          sessions,
          sessions_abandoned,
          sessions_fatal,
          sessions_killed,
          (select count(*) from pg_index i
            where not indisvalid
            and not exists ( /* leave out ones that are being actively rebuilt */
              select * from pg_locks l
              join pg_stat_activity a using (pid)
              where l.relation = i.indexrelid
              and a.state = 'active'
              and a.query ~* 'concurrently'
          )) as invalid_indexes
        from
          pg_stat_database, pg_control_system()
        where
          datname = current_database()
    gauges:
      - '*'
    statement_timeout_seconds: 15
  locks_mode:
    description: >
      Retrieves lock mode statistics from the PostgreSQL `pg_locks` view, providing insights into the different lock modes currently held in the database.
      It returns the lock mode and the count of locks for each mode. This metric helps administrators monitor lock contention and performance.
    sqls:
      13: |-
        with q_locks as ( /* pgwatch_generated */
          select
            *
          from
            pg_locks
          where
            pid <> pg_backend_pid()
            and database = (select oid from pg_database where datname = current_database())
          limit 5000
        )

        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          lockmodes as tag_lockmode,
          coalesce((select count(*) from q_locks where mode = lockmodes), 0) as count
        from
          unnest('{AccessShareLock, ExclusiveLock, RowShareLock, RowExclusiveLock, ShareLock, ShareRowExclusiveLock,  AccessExclusiveLock, ShareUpdateExclusiveLock}'::text[]) lockmodes
    gauges:
      - '*'
    statement_timeout_seconds: 15
  replication:
    description: >
      This metric collects replication statistics from the `pg_stat_replication` view.
      It provides insights into the status of replication connections, including lag times and states.
      This metric is useful for monitoring replication health and performance.
    sqls:
      11: |
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          application_name as tag_application_name,
          usename as tag_usename,
          concat(coalesce(client_addr::text, client_hostname), '_', client_port::text) as tag_client_info,
          coalesce(pg_wal_lsn_diff(case when pg_is_in_recovery() then pg_last_wal_receive_lsn() else pg_current_wal_lsn() end, sent_lsn)::int8, 0) as sent_lag_b,
          coalesce(pg_wal_lsn_diff(case when pg_is_in_recovery() then pg_last_wal_receive_lsn() else pg_current_wal_lsn() end, write_lsn)::int8, 0) as write_lag_b,
          coalesce(pg_wal_lsn_diff(case when pg_is_in_recovery() then pg_last_wal_receive_lsn() else pg_current_wal_lsn() end, flush_lsn)::int8, 0) as flush_lag_b,
          coalesce(pg_wal_lsn_diff(case when pg_is_in_recovery() then pg_last_wal_receive_lsn() else pg_current_wal_lsn() end, replay_lsn)::int8, 0) as replay_lag_b,
          (extract(epoch from write_lag) * 1000)::int8 as write_lag_ms,
          (extract(epoch from flush_lag) * 1000)::int8 as flush_lag_ms,
          (extract(epoch from replay_lag) * 1000)::int8 as replay_lag_ms,
          state,
          sync_state,
          case when sync_state in ('sync', 'quorum') then 1 else 0 end as is_sync_int,
          case when pg_is_in_recovery() then 1 else 0 end as in_recovery_int
        from
          pg_stat_replication
        where
          coalesce(application_name, '') not in ('pg_basebackup', 'pg_rewind');
    gauges:
      - '*'
    is_instance_level: true
    statement_timeout_seconds: 15
  replication_slots:
    description: >
      This metric collects information about replication slots from the `pg_replication_slots` view.
      It provides insights into the status of replication slots, including their activity and lag times.
      This metric is useful for monitoring replication slot health and performance.
    sqls:
      11: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          slot_name::text as tag_slot_name,
          coalesce(plugin, 'physical')::text as tag_plugin,
          active,
          case when active then 0 else 1 end as non_active_int,
          pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)::int8 as restart_lsn_lag_b,
          greatest(age(xmin), age(catalog_xmin))::int8 as xmin_age_tx
        from
          pg_replication_slots
    node_status: primary
    gauges:
      - '*'
    is_instance_level: true
    statement_timeout_seconds: 15
  settings:
    description: >
      This metric collects various PostgreSQL server settings and configurations.
      It provides insights into the server's configuration, including version, memory settings, and other important parameters.
      This metric is useful for monitoring server settings and ensuring optimal performance.
      Note: For lock_timeout and statement_timeout, we use reset_val instead of setting because
      pgwatch overrides these during metric collection, which would mask the actual configured values.
    sqls:
      11: |-
        with base as ( /* pgwatch_generated */
          select
            name,
            -- Use reset_val for lock_timeout/statement_timeout because pgwatch overrides them
            -- during collection (lock_timeout=100ms, statement_timeout per-metric).
            case
              when name in ('lock_timeout', 'statement_timeout') then reset_val
              else setting
            end as effective_setting,
            unit,
            category,
            vartype,
            -- For lock_timeout/statement_timeout, compare reset_val with boot_val
            -- since source becomes 'session' during collection.
            case
              when name in ('lock_timeout', 'statement_timeout') then (reset_val = boot_val)
              else (source = 'default')
            end as is_default_bool
          from pg_settings
        ), with_numeric as (
          select
            *,
            case
              when effective_setting ~ '^-?[0-9]+$' then effective_setting::bigint
              else null
            end as numeric_value
          from base
        )
        select
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          name as tag_setting_name,
          effective_setting as tag_setting_value,
          unit as tag_unit,
          category as tag_category,
          vartype as tag_vartype,
          numeric_value,
          case
            when numeric_value is null then null
            when unit = '8kB' then numeric_value * 8192
            when unit = 'kB' then numeric_value * 1024
            when unit = 'MB' then numeric_value * 1024 * 1024
            when unit = 'B' then numeric_value
            when unit = 'ms' then numeric_value::numeric / 1000
            when unit = 's' then numeric_value::numeric
            when unit = 'min' then numeric_value::numeric * 60
            else null
          end as setting_normalized,
          case unit
            when '8kB' then 'bytes'
            when 'kB' then 'bytes'
            when 'MB' then 'bytes'
            when 'B' then 'bytes'
            when 'ms' then 'seconds'
            when 's' then 'seconds'
            when 'min' then 'seconds'
            else null
          end as unit_normalized,
          case when is_default_bool then 1 else 0 end as is_default,
          1 as configured
        from with_numeric
    gauges:
      - '*'
    is_instance_level: true
    statement_timeout_seconds: 15

  table_stats:
    description: >
      Per-relation table activity, size and maintenance counters bounded
      to the top 100 per database. Adapts the top-N + `'$other$'` bucket
      pattern from !262 (and via that from pgwatch2 PostgresAI edition):
      everything below the cap is summed/aggregated into a single
      `'$other$'` row so dashboard totals stay correct. Reads
      pg_stat_all_tables (not pg_stat_user_tables) so pg_catalog,
      pg_toast and other system schemas stay rankable by size — the
      top-N cap controls cardinality, not a schema filter (the existing
      `_timescaledb%` schema filter on leaf rows is retained for
      consistency with prior behaviour and because Timescale chunks
      already roll up via their partition root). Ranks by
      total_relation_size_b descending (size = relevance for a metric
      that surfaces vacuum/freeze risk); stable tiebreakers
      (`tag_schema`, `tag_table_name`) keep top-N membership from
      churning between scrapes when sizes tie. Aggregate semantics on
      the `'$other$'` row: sum for counters and sizes, min for
      seconds_since_last_* (most recent maintenance across the tail),
      max for tx/mxid freeze ages (oldest still-alive xid is the risk),
      sum for no_autovacuum (count of tail tables with autovacuum off),
      and `tag_table_size_cardinality_mb` is recomputed from the summed
      table_size_b so it stays consistent. The `'$other$'` sentinel
      cannot collide with a real Postgres identifier (`$` is illegal as
      the first character of an unquoted identifier).
    sqls:
      11: |-
        with recursive
            q_root_part as ( /* pgwatch_generated */
                select c.oid,
                        c.relkind,
                        n.nspname root_schema,
                        c.relname root_relname
                from pg_class c
                          join pg_namespace n on n.oid = c.relnamespace
                where relkind in ('p', 'r')
                  and relpersistence <> 't'
                  and not n.nspname like any (array[E'pg\\_%', 'information_schema', E'\\_timescaledb%'])
                  and not exists(select * from pg_inherits where inhrelid = c.oid)
                  and exists(select * from pg_inherits where inhparent = c.oid)
            ),
            q_parts (relid, relkind, level, root) as (
                select oid, relkind, 1, oid
                from q_root_part
                union all
                select inhrelid, c.relkind, level + 1, q.root
                from pg_inherits i
                          join q_parts q on inhparent = q.relid
                          join pg_class c on c.oid = i.inhrelid
            ),
            q_tstats as (
                select (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
                        current_database()                                                                       as tag_datname,
                        relid, -- not sent to final output
                        quote_ident(schemaname)                                                                  as tag_schema,
                        quote_ident(ut.relname)                                                                  as tag_table_name,
                        quote_ident(schemaname) || '.' || quote_ident(ut.relname)                                as tag_table_full_name,
                        pg_table_size(relid)                                                                     as table_size_b,
                        abs(greatest(ceil(log((pg_table_size(relid) + 1) / 10 ^ 6)), 0))::text                   as tag_table_size_cardinality_mb, -- i.e. 0=<1MB, 1=<10MB, 2=<100MB,..
                        pg_total_relation_size(relid)                                                            as total_relation_size_b,
                        case when reltoastrelid <> 0 then pg_total_relation_size(reltoastrelid) else 0::int8 end as toast_size_b,
                        (extract(epoch from now() - greatest(last_vacuum, last_autovacuum)))::int8               as seconds_since_last_vacuum,
                        (extract(epoch from now() - greatest(last_analyze, last_autoanalyze)))::int8             as seconds_since_last_analyze,
                        case when 'autovacuum_enabled=off' = ANY (c.reloptions) then 1 else 0 end                as no_autovacuum,
                        seq_scan,
                        seq_tup_read,
                        coalesce(idx_scan, 0) as idx_scan,
                        coalesce(idx_tup_fetch, 0) as idx_tup_fetch,
                        n_tup_ins,
                        n_tup_upd,
                        n_tup_del,
                        n_tup_hot_upd,
                        n_live_tup,
                        n_dead_tup,
                        vacuum_count,
                        autovacuum_count,
                        analyze_count,
                        autoanalyze_count,
                        case when c.relkind <> 'p' then age(c.relfrozenxid) else 0 end as tx_freeze_age,
                        case when c.relkind <> 'p' then mxid_age(c.relminmxid) else 0 end as mxid_freeze_age
                from pg_stat_all_tables ut
                          join
                      pg_class c on c.oid = ut.relid
                where
                  -- leaving out fully locked tables as pg_relation_size also wants a lock and would wait
                    not exists(select 1 from pg_locks where relation = relid and mode = 'AccessExclusiveLock')
                  and c.relpersistence <> 't' -- and temp tables
            ),
            rows_pre_rank as (
                -- Leaf tables (non-partition-children) excluding the timescale internal chunks
                select
                    epoch_ns, tag_datname, tag_schema, tag_table_name, tag_table_full_name,
                    0 as is_part_root,
                    table_size_b, tag_table_size_cardinality_mb,
                    total_relation_size_b, toast_size_b,
                    seconds_since_last_vacuum, seconds_since_last_analyze, no_autovacuum,
                    seq_scan, seq_tup_read, idx_scan, idx_tup_fetch,
                    n_tup_ins, n_tup_upd, n_tup_del, n_tup_hot_upd,
                    n_live_tup, n_dead_tup,
                    vacuum_count, autovacuum_count, analyze_count, autoanalyze_count,
                    tx_freeze_age, mxid_freeze_age
                from q_tstats
                where not tag_schema like E'\\_timescaledb%'
                  and not exists (select * from q_root_part where oid = q_tstats.relid)
                union all
                -- Partition roots: aggregate of all their parts
                select * from (
                    select
                        epoch_ns,
                        tag_datname,
                        quote_ident(qr.root_schema) as tag_schema,
                        quote_ident(qr.root_relname) as tag_table_name,
                        quote_ident(qr.root_schema) || '.' || quote_ident(qr.root_relname) as tag_table_full_name,
                        1 as is_part_root,
                        sum(table_size_b)::int8 as table_size_b,
                        abs(greatest(ceil(log((sum(table_size_b) + 1) / 10 ^ 6)), 0))::text as tag_table_size_cardinality_mb,
                        sum(total_relation_size_b)::int8 as total_relation_size_b,
                        sum(toast_size_b)::int8 as toast_size_b,
                        min(seconds_since_last_vacuum)::int8 as seconds_since_last_vacuum,
                        min(seconds_since_last_analyze)::int8 as seconds_since_last_analyze,
                        sum(no_autovacuum)::int8 as no_autovacuum,
                        sum(seq_scan)::int8 as seq_scan,
                        sum(seq_tup_read)::int8 as seq_tup_read,
                        sum(idx_scan)::int8 as idx_scan,
                        sum(idx_tup_fetch)::int8 as idx_tup_fetch,
                        sum(n_tup_ins)::int8 as n_tup_ins,
                        sum(n_tup_upd)::int8 as n_tup_upd,
                        sum(n_tup_del)::int8 as n_tup_del,
                        sum(n_tup_hot_upd)::int8 as n_tup_hot_upd,
                        sum(n_live_tup)::int8 as n_live_tup,
                        sum(n_dead_tup)::int8 as n_dead_tup,
                        sum(vacuum_count)::int8 as vacuum_count,
                        sum(autovacuum_count)::int8 as autovacuum_count,
                        sum(analyze_count)::int8 as analyze_count,
                        sum(autoanalyze_count)::int8 as autoanalyze_count,
                        max(tx_freeze_age)::int8 as tx_freeze_age,
                        max(mxid_freeze_age)::int8 as mxid_freeze_age
                    from q_tstats ts
                    join q_parts qp on qp.relid = ts.relid
                    join q_root_part qr on qr.oid = qp.root
                    group by 1, 2, 3, 4, 5, 6
                ) x
            ),
            ranked as (
                select
                    row_number() over (
                        order by total_relation_size_b desc nulls last,
                                 tag_schema, tag_table_name
                    ) as rownum,
                    rows_pre_rank.*
                from rows_pre_rank
            )
        select /* pgwatch_generated */
            epoch_ns, tag_datname, tag_schema, tag_table_name, tag_table_full_name,
            is_part_root,
            table_size_b, tag_table_size_cardinality_mb,
            total_relation_size_b, toast_size_b,
            seconds_since_last_vacuum, seconds_since_last_analyze, no_autovacuum,
            seq_scan, seq_tup_read, idx_scan, idx_tup_fetch,
            n_tup_ins, n_tup_upd, n_tup_del, n_tup_hot_upd,
            n_live_tup, n_dead_tup,
            vacuum_count, autovacuum_count, analyze_count, autoanalyze_count,
            tx_freeze_age, mxid_freeze_age
        from ranked
        where rownum <= 100
        union all
        select
            (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
            current_database() as tag_datname,
            '$other$'::text as tag_schema,
            '$other$'::text as tag_table_name,
            '$other$'::text as tag_table_full_name,
            0 as is_part_root,
            coalesce(sum(table_size_b), 0)::int8 as table_size_b,
            abs(greatest(ceil(log((coalesce(sum(table_size_b), 0) + 1) / 10 ^ 6)), 0))::text as tag_table_size_cardinality_mb,
            coalesce(sum(total_relation_size_b), 0)::int8 as total_relation_size_b,
            coalesce(sum(toast_size_b), 0)::int8 as toast_size_b,
            min(seconds_since_last_vacuum)::int8 as seconds_since_last_vacuum,
            min(seconds_since_last_analyze)::int8 as seconds_since_last_analyze,
            coalesce(sum(no_autovacuum), 0)::int8 as no_autovacuum,
            coalesce(sum(seq_scan), 0)::int8 as seq_scan,
            coalesce(sum(seq_tup_read), 0)::int8 as seq_tup_read,
            coalesce(sum(idx_scan), 0)::int8 as idx_scan,
            coalesce(sum(idx_tup_fetch), 0)::int8 as idx_tup_fetch,
            coalesce(sum(n_tup_ins), 0)::int8 as n_tup_ins,
            coalesce(sum(n_tup_upd), 0)::int8 as n_tup_upd,
            coalesce(sum(n_tup_del), 0)::int8 as n_tup_del,
            coalesce(sum(n_tup_hot_upd), 0)::int8 as n_tup_hot_upd,
            coalesce(sum(n_live_tup), 0)::int8 as n_live_tup,
            coalesce(sum(n_dead_tup), 0)::int8 as n_dead_tup,
            coalesce(sum(vacuum_count), 0)::int8 as vacuum_count,
            coalesce(sum(autovacuum_count), 0)::int8 as autovacuum_count,
            coalesce(sum(analyze_count), 0)::int8 as analyze_count,
            coalesce(sum(autoanalyze_count), 0)::int8 as autoanalyze_count,
            max(tx_freeze_age)::int8 as tx_freeze_age,
            max(mxid_freeze_age)::int8 as mxid_freeze_age
        from ranked
        where rownum > 100
        group by ()
        having count(*) > 0
      16: |-
        with recursive
            q_root_part as ( /* pgwatch_generated */
                select c.oid,
                        c.relkind,
                        n.nspname root_schema,
                        c.relname root_relname
                from pg_class c
                          join pg_namespace n on n.oid = c.relnamespace
                where relkind in ('p', 'r')
                  and relpersistence <> 't'
                  and not n.nspname like any (array[E'pg\\_%', 'information_schema', E'\\_timescaledb%'])
                  and not exists(select * from pg_inherits where inhrelid = c.oid)
                  and exists(select * from pg_inherits where inhparent = c.oid)
            ),
            q_parts (relid, relkind, level, root) as (
                select oid, relkind, 1, oid
                from q_root_part
                union all
                select inhrelid, c.relkind, level + 1, q.root
                from pg_inherits i
                          join q_parts q on inhparent = q.relid
                          join pg_class c on c.oid = i.inhrelid
            ),
            q_tstats as (
                select (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
                        current_database()                                                                       as tag_datname,
                        relid, -- not sent to final output
                        quote_ident(schemaname)                                                                  as tag_schema,
                        quote_ident(ut.relname)                                                                  as tag_table_name,
                        quote_ident(schemaname) || '.' || quote_ident(ut.relname)                                as tag_table_full_name,
                        pg_table_size(relid)                                                                     as table_size_b,
                        abs(greatest(ceil(log((pg_table_size(relid) + 1) / 10 ^ 6)), 0))::text                   as tag_table_size_cardinality_mb, -- i.e. 0=<1MB, 1=<10MB, 2=<100MB,..
                        pg_total_relation_size(relid)                                                            as total_relation_size_b,
                        case when c.reltoastrelid <> 0 then pg_total_relation_size(c.reltoastrelid) else 0::int8 end as toast_size_b,
                        (extract(epoch from now() - greatest(last_vacuum, last_autovacuum)))::int8               as seconds_since_last_vacuum,
                        (extract(epoch from now() - greatest(last_analyze, last_autoanalyze)))::int8             as seconds_since_last_analyze,
                        case when 'autovacuum_enabled=off' = ANY (c.reloptions) then 1 else 0 end                as no_autovacuum,
                        seq_scan,
                        seq_tup_read,
                        coalesce(idx_scan, 0) as idx_scan,
                        coalesce(idx_tup_fetch, 0) as idx_tup_fetch,
                        n_tup_ins,
                        n_tup_upd,
                        n_tup_del,
                        n_tup_hot_upd,
                        n_live_tup,
                        n_dead_tup,
                        vacuum_count,
                        autovacuum_count,
                        analyze_count,
                        autoanalyze_count,
                        case when c.relkind <> 'p' then age(c.relfrozenxid) else 0 end as tx_freeze_age,
                        case when c.relkind <> 'p' then mxid_age(c.relminmxid) else 0 end as mxid_freeze_age,
                        extract(epoch from now() - last_seq_scan)::int8 as last_seq_scan_s
                from pg_stat_all_tables ut
                    join pg_class c on c.oid = ut.relid
                    left join pg_class t on t.oid = c.reltoastrelid
                    left join pg_index ti on ti.indrelid = t.oid
                    left join pg_class tir on tir.oid = ti.indexrelid
                where
                  -- leaving out fully locked tables as pg_relation_size also wants a lock and would wait
                  not exists (select 1 from pg_locks where relation = relid and mode = 'AccessExclusiveLock')
                  and c.relpersistence <> 't' -- and temp tables
                order by case when c.relkind = 'p' then 1e9::int else coalesce(c.relpages, 0) + coalesce(t.relpages, 0) + coalesce(tir.relpages, 0) end desc
                limit 1500 /* Inner pre-filter to avoid expensive pg_relation_size() on every catalog row.
                            1500 (5x the previous final cap of 300) was sized for headroom before this metric
                            adopted the top-100 + $other$ pattern from !262; left at 1500 to keep the $other$
                            aggregate accurate up to 1500-row tail (above that the tail is approximate).
                            Worst-case sample count is still bounded by the final 100 + $other$ row = 101. */
            ),
            rows_pre_rank as (
                -- Leaf tables (non-partition-children) excluding the timescale internal chunks
                select
                    epoch_ns, tag_datname, tag_schema, tag_table_name, tag_table_full_name,
                    0 as is_part_root,
                    table_size_b, tag_table_size_cardinality_mb,
                    total_relation_size_b, toast_size_b,
                    seconds_since_last_vacuum, seconds_since_last_analyze, no_autovacuum,
                    seq_scan, seq_tup_read, idx_scan, idx_tup_fetch,
                    n_tup_ins, n_tup_upd, n_tup_del, n_tup_hot_upd,
                    n_live_tup, n_dead_tup,
                    vacuum_count, autovacuum_count, analyze_count, autoanalyze_count,
                    tx_freeze_age, mxid_freeze_age,
                    last_seq_scan_s
                from q_tstats
                where not tag_schema like E'\\_timescaledb%'
                  and not exists (select * from q_root_part where oid = q_tstats.relid)
                union all
                -- Partition roots: aggregate of all their parts
                select * from (
                    select
                        epoch_ns,
                        tag_datname,
                        quote_ident(qr.root_schema) as tag_schema,
                        quote_ident(qr.root_relname) as tag_table_name,
                        quote_ident(qr.root_schema) || '.' || quote_ident(qr.root_relname) as tag_table_full_name,
                        1 as is_part_root,
                        sum(table_size_b)::int8 as table_size_b,
                        abs(greatest(ceil(log((sum(table_size_b) + 1) / 10 ^ 6)), 0))::text as tag_table_size_cardinality_mb,
                        sum(total_relation_size_b)::int8 as total_relation_size_b,
                        sum(toast_size_b)::int8 as toast_size_b,
                        min(seconds_since_last_vacuum)::int8 as seconds_since_last_vacuum,
                        min(seconds_since_last_analyze)::int8 as seconds_since_last_analyze,
                        sum(no_autovacuum)::int8 as no_autovacuum,
                        sum(seq_scan)::int8 as seq_scan,
                        sum(seq_tup_read)::int8 as seq_tup_read,
                        sum(idx_scan)::int8 as idx_scan,
                        sum(idx_tup_fetch)::int8 as idx_tup_fetch,
                        sum(n_tup_ins)::int8 as n_tup_ins,
                        sum(n_tup_upd)::int8 as n_tup_upd,
                        sum(n_tup_del)::int8 as n_tup_del,
                        sum(n_tup_hot_upd)::int8 as n_tup_hot_upd,
                        sum(n_live_tup)::int8 as n_live_tup,
                        sum(n_dead_tup)::int8 as n_dead_tup,
                        sum(vacuum_count)::int8 as vacuum_count,
                        sum(autovacuum_count)::int8 as autovacuum_count,
                        sum(analyze_count)::int8 as analyze_count,
                        sum(autoanalyze_count)::int8 as autoanalyze_count,
                        max(tx_freeze_age)::int8 as tx_freeze_age,
                        max(mxid_freeze_age)::int8 as mxid_freeze_age,
                        min(last_seq_scan_s)::int8 as last_seq_scan_s
                    from q_tstats ts
                    join q_parts qp on qp.relid = ts.relid
                    join q_root_part qr on qr.oid = qp.root
                    group by 1, 2, 3, 4, 5, 6
                ) x
            ),
            ranked as (
                select
                    row_number() over (
                        order by total_relation_size_b desc nulls last,
                                 tag_schema, tag_table_name
                    ) as rownum,
                    rows_pre_rank.*
                from rows_pre_rank
            )
        select /* pgwatch_generated */
            epoch_ns, tag_datname, tag_schema, tag_table_name, tag_table_full_name,
            is_part_root,
            table_size_b, tag_table_size_cardinality_mb,
            total_relation_size_b, toast_size_b,
            seconds_since_last_vacuum, seconds_since_last_analyze, no_autovacuum,
            seq_scan, seq_tup_read, idx_scan, idx_tup_fetch,
            n_tup_ins, n_tup_upd, n_tup_del, n_tup_hot_upd,
            n_live_tup, n_dead_tup,
            vacuum_count, autovacuum_count, analyze_count, autoanalyze_count,
            tx_freeze_age, mxid_freeze_age,
            last_seq_scan_s
        from ranked
        where rownum <= 100
        union all
        select
            (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
            current_database() as tag_datname,
            '$other$'::text as tag_schema,
            '$other$'::text as tag_table_name,
            '$other$'::text as tag_table_full_name,
            0 as is_part_root,
            coalesce(sum(table_size_b), 0)::int8 as table_size_b,
            abs(greatest(ceil(log((coalesce(sum(table_size_b), 0) + 1) / 10 ^ 6)), 0))::text as tag_table_size_cardinality_mb,
            coalesce(sum(total_relation_size_b), 0)::int8 as total_relation_size_b,
            coalesce(sum(toast_size_b), 0)::int8 as toast_size_b,
            min(seconds_since_last_vacuum)::int8 as seconds_since_last_vacuum,
            min(seconds_since_last_analyze)::int8 as seconds_since_last_analyze,
            coalesce(sum(no_autovacuum), 0)::int8 as no_autovacuum,
            coalesce(sum(seq_scan), 0)::int8 as seq_scan,
            coalesce(sum(seq_tup_read), 0)::int8 as seq_tup_read,
            coalesce(sum(idx_scan), 0)::int8 as idx_scan,
            coalesce(sum(idx_tup_fetch), 0)::int8 as idx_tup_fetch,
            coalesce(sum(n_tup_ins), 0)::int8 as n_tup_ins,
            coalesce(sum(n_tup_upd), 0)::int8 as n_tup_upd,
            coalesce(sum(n_tup_del), 0)::int8 as n_tup_del,
            coalesce(sum(n_tup_hot_upd), 0)::int8 as n_tup_hot_upd,
            coalesce(sum(n_live_tup), 0)::int8 as n_live_tup,
            coalesce(sum(n_dead_tup), 0)::int8 as n_dead_tup,
            coalesce(sum(vacuum_count), 0)::int8 as vacuum_count,
            coalesce(sum(autovacuum_count), 0)::int8 as autovacuum_count,
            coalesce(sum(analyze_count), 0)::int8 as analyze_count,
            coalesce(sum(autoanalyze_count), 0)::int8 as autoanalyze_count,
            max(tx_freeze_age)::int8 as tx_freeze_age,
            max(mxid_freeze_age)::int8 as mxid_freeze_age,
            min(last_seq_scan_s)::int8 as last_seq_scan_s
        from ranked
        where rownum > 100
        group by ()
        having count(*) > 0
    gauges:
      - table_size_b
      - total_relation_size_b
      - toast_size_b
      - seconds_since_last_vacuum
      - seconds_since_last_analyze
      - n_live_tup
      - n_dead_tup
    statement_timeout_seconds: 300
  wal:
    description: >
      This metric collects information about the Write-Ahead Logging (WAL) system in PostgreSQL.
      It provides insights into WAL activity, including the current WAL location, replay lag, and other related metrics.
    sqls:
      11: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          case
            when pg_is_in_recovery() = false then
              pg_wal_lsn_diff(pg_current_wal_lsn(), '0/0')::int8
            else
              pg_wal_lsn_diff(pg_last_wal_replay_lsn(), '0/0')::int8
            end as xlog_location_b,
          case when pg_is_in_recovery() then 1 else 0 end as in_recovery_int,
          extract(epoch from (now() - pg_postmaster_start_time()))::int8 as postmaster_uptime_s,
          system_identifier::text as tag_sys_id,
          case
            when pg_is_in_recovery() = false then
              ('x'||substr(pg_walfile_name(pg_current_wal_lsn()), 1, 8))::bit(32)::int
            else
              (select min_recovery_end_timeline::int from pg_control_recovery())
            end as timeline
        from pg_control_system()
    gauges:
      - '*'
    is_instance_level: true
    statement_timeout_seconds: 15
  wait_events:
    description: >
      This metric retrieves information about wait events for active sessions in the PostgreSQL database.
      It tracks the wait event types and counts of processes currently experiencing each wait event type,
      providing insights into potential bottlenecks and resource contention issues.
    sqls:
      11: |-
        select datname as tag_datname, coalesce (wait_event, 'CPU*') as tag_wait_event, coalesce(wait_event_type, 'CPU*') as tag_wait_event_type, count(*) as total /* pgwatch_generated */
        from pg_stat_activity
        where state = 'active'
        group by tag_datname, tag_wait_event_type, tag_wait_event
        union
        select 'server_process' as tag_datname, coalesce (wait_event, 'CPU*') as tag_wait_event, coalesce(wait_event_type, 'CPU*') as tag_wait_event_type, count(*) as total
        from pg_stat_activity
        where state = 'active' and datname is null
        group by tag_datname, tag_wait_event_type, tag_wait_event
      14: |-
        select datname as tag_datname, query_id::text as tag_query_id, coalesce (wait_event, 'CPU*') as tag_wait_event, coalesce(wait_event_type, 'CPU*') as tag_wait_event_type, count(*) as total /* pgwatch_generated */
        from pg_stat_activity
        where state = 'active'
        group by tag_datname, tag_query_id, tag_wait_event_type, tag_wait_event
        union
        select 'server_process' as tag_datname, null as tag_query_id, coalesce (wait_event, 'CPU*') as tag_wait_event, coalesce(wait_event_type, 'CPU*') as tag_wait_event_type, count(*) as total
        from pg_stat_activity
        where state = 'active' and datname is null
        group by tag_datname, tag_query_id, tag_wait_event_type, tag_wait_event
    gauges:
      - total
    is_instance_level: true
    statement_timeout_seconds: 15
  pg_stat_activity:
    sqls:
      11: |-
        select /* pgwatch_generated */
            pg_database.datname as tag_datname,
            tmp2.tag_application_name,
            tmp.tag_state,
            coalesce(count,0) as count,
            coalesce(max_tx_duration,0) as max_tx_duration
        from
          (
            values ('active'),
                  ('idle'),
                  ('idle in transaction'),
                  ('idle in transaction (aborted)'),
                  ('fastpath function call'),
                  ('disabled')
          ) as tmp(tag_state)
        cross join pg_database
        left join
          (
            select datname,
              application_name as tag_application_name,
              state as tag_state,
              count(*) as count,
              max(extract(epoch from now() - xact_start))::float as max_tx_duration
            from pg_stat_activity
            group by datname, tag_application_name, tag_state
          ) as tmp2
        on tmp.tag_state = tmp2.tag_state and pg_database.datname = tmp2.datname
        where pg_database.datname = current_database()

    gauges:
      - count
      - max_tx_duration
    statement_timeout_seconds: 15
  pg_archiver:
    sqls:
      11: |
        with
          current_wal_file as ( /* pgwatch_generated */
            select case when not pg_is_in_recovery() then pg_walfile_name(pg_current_wal_insert_lsn()) else null end pg_walfile_name
          ),
          current_wal as (
            select
              ('x'||substring(pg_walfile_name,9,8))::bit(32)::int log,
              ('x'||substring(pg_walfile_name,17,8))::bit(32)::int seg,
              pg_walfile_name
            from current_wal_file
          ),
          archive_wal as(
            select
              ('x'||substring(last_archived_wal,9,8))::bit(32)::int log,
              ('x'||substring(last_archived_wal,17,8))::bit(32)::int seg,
              last_archived_wal
            from pg_stat_archiver
          )
        select (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          coalesce(((cw.log - aw.log) * 256) + (cw.seg-aw.seg), -1) as pending_wal_count
        from current_wal cw, archive_wal aw
    gauges:
      - pending_wal_count
    statement_timeout_seconds: 15
  pg_blocked:
    sqls:
      11: |-
        select /* pgwatch_generated */
          (extract(epoch from now()) * 1e9)::int8 as epoch_ns,
          current_database() as tag_datname,
          count(*) as queries,
          case
            when locktype = 'transactionid' then '__transaction__'
            else relation::regclass::text
          end as tag_table
        from pg_catalog.pg_locks blocked
        where
          not blocked.granted
          and database = (select oid from pg_database where datname = current_database())
        group by locktype, relation
        limit 5000
    gauges:
      - queries
    statement_timeout_seconds: 15
  lock_waits:
    description: >
      Retrieves detailed information about lock waits, including blocked and blocking processes with their queries, users, and application names.
      It returns blocked and blocker process IDs, lock modes and types, affected tables, queries, and wait/transaction durations.
      This metric helps administrators identify and diagnose lock contention issues in detail.
    sqls:
      14: |-
        with sa_snapshot as ( /* pgwatch_generated */
          select *
          from pg_stat_activity
          where
            datname = current_database()
            and pid <> pg_backend_pid()
            and state in ('active', 'idle in transaction', 'idle in transaction (aborted)')
        ),
        pid_tables as (
          select distinct on (pid) pid, relation::regclass::text as table_name
          from pg_catalog.pg_locks
          where relation is not null
            and locktype in ('tuple', 'relation')
            and relation::regclass::text not like '%_pkey'
            and relation::regclass::text not like '%_idx'
          order by pid, locktype
        )
        select
          blocked.pid::text as tag_blocked_pid,
          current_database() as tag_datname,
          blocked_stm.usename::text as tag_blocked_user,
          blocked_stm.application_name::text as tag_blocked_appname,
          blocked.mode as blocked_mode,
          blocked.locktype as blocked_locktype,
          coalesce(blocked.relation::regclass::text, blocked_tbl.table_name, '') as tag_blocked_table,
          blocked_stm.query_id::text as tag_blocked_query_id,
          (extract(epoch from (clock_timestamp() - blocked_stm.state_change)) * 1000)::bigint as blocked_ms,
          blocker.pid::text as tag_blocker_pid,
          blocker_stm.usename::text as tag_blocker_user,
          blocker_stm.application_name::text as tag_blocker_appname,
          blocker.mode as blocker_mode,
          blocker.locktype as blocker_locktype,
          coalesce(blocker.relation::regclass::text, blocker_tbl.table_name, '') as tag_blocker_table,
          blocker_stm.query_id::text as tag_blocker_query_id,
          (extract(epoch from (clock_timestamp() - blocker_stm.xact_start)) * 1000)::bigint as blocker_tx_ms
        from pg_catalog.pg_locks as blocked
        join sa_snapshot as blocked_stm on blocked_stm.pid = blocked.pid
        join pg_catalog.pg_locks as blocker on
          blocked.pid <> blocker.pid
          and blocker.granted
          and (
            (blocked.database = blocker.database)
            or (blocked.database is null and blocker.database is null)
          )
          and (
            blocked.relation = blocker.relation
            or blocked.transactionid = blocker.transactionid
          )
        join sa_snapshot as blocker_stm on blocker_stm.pid = blocker.pid
        left join pid_tables as blocked_tbl on blocked_tbl.pid = blocked.pid
        left join pid_tables as blocker_tbl on blocker_tbl.pid = blocker.pid
        where not blocked.granted
        order by blocked_ms desc
        limit 10000
    gauges:
      - blocked_ms
      - blocker_tx_ms
    statement_timeout_seconds: 15
  xmin_horizon:
    description: >
      Tracks the current xmin horizon age split by blocker class and horizon type:
      data horizon blockers from primary-side client backends, replication slot xmin,
      standby feedback seen via pg_stat_replication, and prepared transactions; plus
      catalog horizon blockers from replication slot catalog_xmin. Emits component
      `*_age_tx` and `*_count` columns, `data_horizon_age_tx`, `catalog_horizon_age_tx`,
      and `snapshot_xmin` as a raw anchor from txid_snapshot_xmin(txid_current_snapshot()).
      Component age/count columns emit 0 (never NULL) when the component has no active
      blocker. This metric helps distinguish data tuple cleanup blockers from logical
      replication catalog cleanup blockers during wraparound/bloat RCA.
    sqls:
      11: |-
        with snapshot as (
          select txid_snapshot_xmin(txid_current_snapshot())::int8 as snapshot_xmin
        ),
        activity as (
          select
            max(age(backend_xmin))::int8 as pg_stat_activity_age_tx,
            count(*)::int8 as pg_stat_activity_count
          from pg_stat_activity
          where
            pid <> pg_backend_pid()
            and backend_type = 'client backend'
            and backend_xmin is not null
            and usename <> current_user
        ),
        slots as (
          select
            max(age(xmin))::int8 as pg_replication_slots_age_tx,
            count(*)::int8 as pg_replication_slots_count
          from pg_replication_slots
          where xmin is not null
        ),
        slots_catalog as (
          select
            max(age(catalog_xmin))::int8 as pg_replication_slots_catalog_age_tx,
            count(*)::int8 as pg_replication_slots_catalog_count
          from pg_replication_slots
          where catalog_xmin is not null
        ),
        replication as (
          select
            max(age(backend_xmin))::int8 as pg_stat_replication_age_tx,
            count(*)::int8 as pg_stat_replication_count
          from pg_stat_replication
          where backend_xmin is not null
        ),
        prepared as (
          select
            max(age(transaction))::int8 as pg_prepared_xacts_age_tx,
            count(*)::int8 as pg_prepared_xacts_count
          from pg_prepared_xacts
