[analytics]
# Suppress Grafana's update-check phone-home and the "New version available"
# banner that renders on every dashboard. Demo deployments should look
# polished; the banner is visually distracting and offers no operator value
# in a pinned-version monitoring stack.
check_for_updates = false

[users]
home_page = /d/f90500a0-a12e-4081-a2f0-07ed96f27915/1-postgres-node-performance-overview-high-level/
default_theme = desertbloom

[feature_toggles]
# Required for experimental themes (desertbloom, sapphiredusk, etc.)
enable = grafanaconThemes

[auth]
# When OAuth is enabled, optionally disable the basic login form
disable_login_form = false

[auth.generic_oauth]
# OAuth is disabled by default; enable via GF_AUTH_GENERIC_OAUTH_ENABLED env var
enabled = false
name = PostgresAI
allow_sign_up = true
